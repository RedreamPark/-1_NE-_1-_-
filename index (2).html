<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>공통영어1 · Lesson 1 어법 선택형 퀴즈 (민병천)</title>
<style>
  :root {
    --green: #1D9E75; --green-dark: #0F6E56; --green-light: #E1F5EE; --green-deep: #085041;
    --red: #A32D2D; --red-light: #FCEBEB; --red-deep: #501313;
    --amber: #BA7517; --amber-light: #FAEEDA; --amber-deep: #633806;
    --blue: #185FA5; --blue-light: #E6F1FB;
    --bg: #F6F4F0; --card: #FFFFFF; --border: rgba(0,0,0,0.09);
    --text: #1a1a1a; --muted: #666; --hint: #999;
    --r: 12px; --rs: 8px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Noto Sans KR','Apple SD Gothic Neo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
  #app{max-width:680px;margin:0 auto;padding:24px 16px 60px;}

  /* INTRO */
  .intro-box{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:2.5rem 2rem;text-align:center;margin-top:16px;}
  .intro-logo{font-size:11px;font-weight:800;letter-spacing:.14em;color:var(--green);text-transform:uppercase;margin-bottom:20px;}
  .intro-title{font-size:26px;font-weight:800;line-height:1.3;margin-bottom:6px;}
  .intro-sub{font-size:14px;color:var(--muted);margin-bottom:28px;}
  .info-row{display:flex;gap:12px;justify-content:center;margin-bottom:24px;flex-wrap:wrap;}
  .info-card{background:var(--bg);border-radius:var(--rs);padding:14px 20px;min-width:90px;}
  .info-num{font-size:24px;font-weight:800;color:var(--green);}
  .info-lbl{font-size:11px;color:var(--muted);margin-top:3px;}
  .intro-note{background:var(--blue-light);border-radius:var(--rs);padding:12px 16px;font-size:13px;color:var(--blue);margin-bottom:28px;line-height:1.7;text-align:left;}
  .start-btn{width:100%;padding:16px;font-size:16px;font-weight:800;font-family:inherit;background:var(--green);color:#fff;border:none;border-radius:var(--r);cursor:pointer;transition:background .15s,transform .1s;}
  .start-btn:hover{background:var(--green-dark);}
  .start-btn:active{transform:scale(.98);}

  /* HEADER */
  .progress-wrap{height:5px;background:#DDD;border-radius:99px;overflow:hidden;margin-bottom:12px;}
  .progress-fill{height:5px;background:var(--green);border-radius:99px;transition:width .5s cubic-bezier(.4,0,.2,1);}
  .timer-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
  .quiz-counter{font-size:13px;font-weight:700;color:var(--muted);}
  .cutline-chip{font-size:12px;font-weight:700;color:var(--green-deep);background:var(--green-light);padding:3px 10px;border-radius:99px;}
  .timer-block{display:flex;flex-direction:column;align-items:center;gap:2px;}
  .timer-lbl{font-size:10px;color:var(--hint);text-transform:uppercase;letter-spacing:.05em;}
  .timer-ring{position:relative;width:52px;height:52px;}
  .timer-ring svg{transform:rotate(-90deg);}
  .timer-ring circle{fill:none;stroke-width:4;}
  .ring-bg{stroke:#E0E0E0;}
  .ring-fill{stroke:var(--green);stroke-linecap:round;transition:stroke-dashoffset 1s linear,stroke .4s;}
  .timer-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;color:var(--text);transition:color .3s;}
  .tw .ring-fill{stroke:var(--amber);} .tw .timer-num{color:var(--amber);}
  .td .ring-fill{stroke:var(--red);} .td .timer-num{color:var(--red);}
  @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
  .td .timer-ring{animation:pulse .8s infinite;}

  /* CARD */
  .q-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:24px;margin-bottom:14px;animation:fadeUp .22s ease;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .q-num{font-size:11px;color:var(--hint);margin-bottom:8px;letter-spacing:.05em;text-transform:uppercase;}
  .q-ko{font-size:13px;color:var(--muted);line-height:1.7;margin-bottom:10px;}
  .q-en{font-size:16px;line-height:2.1;margin-bottom:18px;color:var(--text);}
  .blank-tag{font-weight:800;font-size:14px;color:var(--blue);background:var(--blue-light);padding:2px 8px;border-radius:5px;margin:0 2px;}
  .blank-section{margin-bottom:14px;}
  .blank-label{font-size:12px;color:var(--muted);margin-bottom:8px;font-weight:600;}
  .choices{display:flex;gap:10px;flex-wrap:wrap;}
  .choice-btn{flex:1;min-width:110px;padding:12px 14px;font-size:15px;font-family:inherit;border:1.5px solid var(--border);border-radius:var(--rs);background:var(--card);color:var(--text);cursor:pointer;text-align:center;font-weight:600;transition:all .12s;}
  .choice-btn:hover:not(:disabled){border-color:var(--green);background:var(--green-light);color:var(--green-deep);}
  .choice-btn.correct{background:var(--green-light);border-color:var(--green);color:var(--green-deep);font-weight:800;}
  .choice-btn.wrong{background:var(--red-light);border-color:var(--red);color:var(--red-deep);}
  .choice-btn:disabled{cursor:default;}
  .timeout-msg{margin-top:10px;padding:10px 14px;border-radius:var(--rs);font-size:13px;font-weight:600;background:var(--amber-light);color:var(--amber-deep);border:1px solid #FAC775;}

  /* RESULT */
  .result-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:32px 24px;text-align:center;margin-bottom:16px;}
  .result-emoji{font-size:44px;margin-bottom:12px;}
  .result-score{font-size:56px;font-weight:800;line-height:1;margin-bottom:8px;}
  .score-pass{color:var(--green);} .score-fail{color:var(--red);}
  .result-badge{display:inline-block;padding:5px 18px;border-radius:99px;font-size:14px;font-weight:800;margin-bottom:8px;}
  .badge-pass{background:var(--green-light);color:var(--green-deep);}
  .badge-fail{background:var(--red-light);color:var(--red-deep);}
  .result-pct{font-size:13px;color:var(--muted);margin-bottom:22px;}
  .stat-row{display:flex;gap:10px;justify-content:center;margin-bottom:26px;flex-wrap:wrap;}
  .stat-card{background:var(--bg);border-radius:var(--rs);padding:12px 18px;}
  .stat-num{font-size:22px;font-weight:800;}
  .stat-lbl{font-size:11px;color:var(--muted);margin-top:2px;}
  .s-ok{color:var(--green);} .s-ng{color:var(--red);} .s-to{color:var(--amber);}
  .retry-btn{width:100%;padding:15px;font-size:15px;font-weight:800;font-family:inherit;background:var(--green);color:#fff;border:none;border-radius:var(--r);cursor:pointer;transition:background .15s,transform .1s;}
  .retry-btn:hover{background:var(--green-dark);}
  .retry-btn:active{transform:scale(.98);}
  .review-title{font-size:14px;font-weight:800;color:var(--text);margin-bottom:10px;margin-top:16px;}
  .review-item{background:var(--card);border:1px solid #F09595;border-radius:var(--rs);padding:14px 16px;margin-bottom:8px;}
  .review-item.to{border-color:#FAC775;}
  .r-num{font-size:11px;color:var(--hint);margin-bottom:4px;}
  .r-ko{font-size:13px;color:var(--muted);margin-bottom:4px;line-height:1.6;}
  .r-en{font-size:13px;color:var(--text);margin-bottom:8px;line-height:1.7;}
  .tag{display:inline-block;padding:3px 9px;border-radius:99px;font-size:11px;font-weight:700;margin-right:4px;margin-top:2px;}
  .tag-ng{background:var(--red-light);color:var(--red-deep);}
  .tag-ok{background:var(--green-light);color:var(--green-deep);}
  .tag-to{background:var(--amber-light);color:var(--amber-deep);}
</style>
</head>

  {n:39, ko:"문제 해결 능력을 발전시킴으로써 당신은 화를 내지 않고 문제를 해결할 많은 방법이 있다는 것을 배울 것이다.", en:"By [A] problem-solving skills, you will learn [B] there [C] many ways [D] a problem without [E] angry.", blanks:[{label:"[A]",choices:["developed","developing"],answer:"developing"},{label:"[B]",choices:["what","that"],answer:"that"},{label:"[C]",choices:["is","are"],answer:"are"},{label:"[D]",choices:["solving","to solve"],answer:"to solve"},{label:"[E]",choices:["getting","get"],answer:"getting"}]},
  {n:40, ko:"화는 우리 모두가 겪는 감정이다.", en:"Anger is an emotion [A] we all experience.", blanks:[{label:"[A]",choices:["that","what"],answer:"that"}]},
  {n:41, ko:"화를 적절하게 다룸으로써 당신은 감정의 주도권을 가질 수 있다.", en:"By managing your anger [A], you can be the boss of your feelings, not the other way around.", blanks:[{label:"[A]",choices:["properly","proper"],answer:"properly"}]},
  {n:42, ko:"이것은 진정한 자아를 찾고 당신의 삶을 장악하는 데 있어 중요한 단계이다.", en:"This is an important step in [A] your true self and [B] control of your life.", blanks:[{label:"[A]",choices:["find","finding"],answer:"finding"},{label:"[B]",choices:["to take","taking"],answer:"taking"}]},
];

const TOTAL=20, CUTLINE=18, TIME_LIMIT=5;
const CIRCUM=2*Math.PI*20;

let questions=[], idx=0, answers={}, timeouts={}, screen='intro';
let timerSec=TIME_LIMIT, timerInterval=null;

function shuffle(a){let b=[...a];for(let i=b.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

function start(){
  questions=shuffle(ALL_Q).slice(0,TOTAL);
  idx=0; answers={}; timeouts={}; screen='quiz';
  startTimer(); render();
}

function startTimer(){
  clearInterval(timerInterval);
  timerSec=TIME_LIMIT;
  timerInterval=setInterval(()=>{
    timerSec--;
    updateTimerUI();
    if(timerSec<=0) onTimeout();
  },1000);
}

function updateTimerUI(){
  const ring=document.querySelector('.ring-fill');
  const num=document.querySelector('.timer-num');
  const wrap=document.querySelector('.timer-inner');
  if(!ring||!num) return;
  ring.style.strokeDashoffset=CIRCUM*(1-(timerSec/TIME_LIMIT));
  num.textContent=timerSec;
  if(wrap) wrap.className='timer-inner'+(timerSec<=1?' td':timerSec<=2?' tw':'');
}

function onTimeout(){
  clearInterval(timerInterval);
  timeouts[idx]=true;
  answers[idx]='__timeout__';
  render();
  setTimeout(()=>advance(),1200);
}

function advance(){
  if(idx<TOTAL-1){idx++;startTimer();render();}
  else{clearInterval(timerInterval);screen='result';render();}
}

function isCorrect(q,qi){
  if(!answers[qi]||answers[qi]==='__timeout__') return false;
  return q.blanks.every((_,bi)=>answers[`${qi}_${bi}`]===q.blanks[bi].answer);
}

function scoreQ(){
  return questions.reduce((c,q,qi)=>isCorrect(q,qi)?c+1:c,0);
}

function render(){
  const app=document.getElementById('app');
  if(screen==='intro') app.innerHTML=renderIntro();
  else if(screen==='quiz') app.innerHTML=renderQuiz();
  else app.innerHTML=renderResult();
  attachEvents();
}

function renderIntro(){
  return `<div class="intro-box">
  <div class="intro-logo">NE능률(민병천) · 공통영어1</div>
  <div class="intro-title">Lesson 1<br>어법 선택형 연습</div>
  <div class="intro-sub">청소년의 화 | Adolescent Anger</div>
  <div class="info-row">
    <div class="info-card"><div class="info-num">${TOTAL}</div><div class="info-lbl">랜덤 문항</div></div>
    <div class="info-card"><div class="info-num">${CUTLINE}개</div><div class="info-lbl">합격 커트라인</div></div>
    <div class="info-card"><div class="info-num">5초</div><div class="info-lbl">문항당 제한</div></div>
    <div class="info-card"><div class="info-num">42</div><div class="info-lbl">전체 문항 풀</div></div>
  </div>
  <div class="intro-note">⏱ 문제당 <strong>5초</strong> 제한이 있습니다.<br>답을 선택하면 즉시 채점 후 다음 문제로 넘어갑니다.<br>빈칸이 여러 개인 문항은 하나씩 순서대로 풀어요.</div>
  <button class="start-btn" id="start-btn">시작하기</button>
</div>`;
}

function renderQuiz(){
  const q=questions[idx];
  const pct=Math.round((idx/TOTAL)*100);
  const offset=CIRCUM*(1-(timerSec/TIME_LIMIT));
  const twCls=timerSec<=1?'td':timerSec<=2?'tw':'';
  const isTO=timeouts[idx];

  let enHtml=q.en;
  q.blanks.forEach(b=>{enHtml=enHtml.replace(b.label,`<span class="blank-tag">${b.label}</span>`);});

  const currentBi=q.blanks.findIndex((_,bi)=>answers[`${idx}_${bi}`]===undefined);
  const b=currentBi>=0?q.blanks[currentBi]:null;

  let bodyHtml='';
  if(isTO){
    bodyHtml=`<div class="timeout-msg">⏰ 시간 초과! &nbsp;정답: <strong>${q.blanks.map(b=>b.answer).join(' / ')}</strong></div>`;
  } else if(b){
    bodyHtml=`<div class="blank-section">
      <div class="blank-label">${b.label} 중 알맞은 것을 고르세요</div>
      <div class="choices">${b.choices.map(c=>`<button class="choice-btn" data-bi="${currentBi}" data-choice="${c}">${c}</button>`).join('')}</div>
    </div>`;
  }

  return `<div style="margin-bottom:10px;">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
    <div class="quiz-counter">문항 ${idx+1} / ${TOTAL}</div>
    <div class="cutline-chip">커트라인 ${CUTLINE}개</div>
  </div>
  <div class="progress-wrap"><div class="progress-fill" style="width:${pct}%"></div></div>
</div>
<div class="timer-row">
  <div style="font-size:13px;color:var(--muted);">NE능률(민병천) · Lesson 1</div>
  <div class="timer-block">
    <div class="timer-lbl">남은시간</div>
    <div class="timer-inner ${twCls}">
      <div class="timer-ring">
        <svg width="52" height="52" viewBox="0 0 52 52">
          <circle class="ring-bg" cx="26" cy="26" r="20"/>
          <circle class="ring-fill" cx="26" cy="26" r="20" stroke-dasharray="${CIRCUM}" stroke-dashoffset="${offset}"/>
        </svg>
        <div class="timer-num">${timerSec}</div>
      </div>
    </div>
  </div>
</div>
<div class="q-card">
  <div class="q-num">원문 ${q.n}번</div>
  <div class="q-ko">${q.ko}</div>
  <div class="q-en">${enHtml}</div>
  ${bodyHtml}
</div>`;
}

function renderResult(){
  const correct=scoreQ();
  const toCount=Object.keys(timeouts).length;
  const pass=correct>=CUTLINE;
  const pct=Math.round((correct/TOTAL)*100);
  const emoji=pass?(correct===TOTAL?'🎉':'👍'):(correct>=15?'💪':'📚');
  const wrongIdxs=questions.map((_,qi)=>qi).filter(qi=>!isCorrect(questions[qi],qi));

  return `<div class="result-card">
  <div class="result-emoji">${emoji}</div>
  <div class="result-score ${pass?'score-pass':'score-fail'}">${correct} / ${TOTAL}</div>
  <div class="result-badge ${pass?'badge-pass':'badge-fail'}">${pass?'합격 ✓':'불합격 ✗'} · 커트라인 ${CUTLINE}개</div>
  <div class="result-pct">정답률 ${pct}%</div>
  <div class="stat-row">
    <div class="stat-card"><div class="stat-num s-ok">${correct}</div><div class="stat-lbl">정답</div></div>
    <div class="stat-card"><div class="stat-num s-ng">${TOTAL-correct-toCount}</div><div class="stat-lbl">오답</div></div>
    <div class="stat-card"><div class="stat-num s-to">${toCount}</div><div class="stat-lbl">시간초과</div></div>
  </div>
  <button class="retry-btn" id="retry-btn">다시 풀기 (새 랜덤 20문항)</button>
</div>
${wrongIdxs.length>0?`
<div class="review-title">오답 목록 (${wrongIdxs.length}개)</div>
${wrongIdxs.map(qi=>{
  const q=questions[qi];
  const isTO=timeouts[qi];
  const wBlanks=q.blanks.filter((b,bi)=>answers[`${qi}_${bi}`]!==b.answer);
  return `<div class="review-item ${isTO?'to':''}">
    <div class="r-num">원문 ${q.n}번${isTO?' ⏰ 시간초과':''}</div>
    <div class="r-ko">${q.ko}</div>
    <div class="r-en">${q.en}</div>
    <div>${wBlanks.map(b=>{
      const sel=answers[`${qi}_${q.blanks.indexOf(b)}`];
      const isT=sel==='__timeout__'||!sel;
      return `<span class="tag ${isT?'tag-to':'tag-ng'}">${b.label} ${isT?'시간초과':'선택: '+sel}</span><span class="tag tag-ok">정답: ${b.answer}</span>`;
    }).join('')}</div>
  </div>`;}).join('')}`
:`<div style="text-align:center;color:var(--green);font-weight:800;padding:20px;font-size:15px;">전 문항 정답! 완벽합니다 🎉</div>`}`;
}

function attachEvents(){
  const app=document.getElementById('app');
  const s=app.querySelector('#start-btn'); if(s) s.addEventListener('click',start);
  const r=app.querySelector('#retry-btn'); if(r) r.addEventListener('click',start);

  app.querySelectorAll('.choice-btn').forEach(btn=>btn.addEventListener('click',()=>{
    const bi=parseInt(btn.dataset.bi), choice=btn.dataset.choice;
    const q=questions[idx], key=`${idx}_${bi}`;
    if(answers[key]!==undefined) return;
    answers[key]=choice;
    answers[idx]=choice;
    const correct=q.blanks[bi].answer;
    const isOk=choice===correct;
    btn.classList.add(isOk?'correct':'wrong');
    btn.parentElement.querySelectorAll('.choice-btn').forEach(b2=>{
      b2.disabled=true;
      if(!isOk&&b2.dataset.choice===correct) b2.classList.add('correct');
    });
    const nextBi=q.blanks.findIndex((_,i)=>answers[`${idx}_${i}`]===undefined);
    setTimeout(()=>{
      if(nextBi>=0){clearInterval(timerInterval);timerSec=TIME_LIMIT;startTimer();render();}
      else advance();
    },isOk?400:800);
  }));
}

render();
</script>
</body>
</html>
